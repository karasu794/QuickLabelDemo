name: Stage4 Contracts & E2E (with optional DB contracts)

on:
  push:
    branches: [ main, develop, staging, feature/** ]
  pull_request:
    branches: [ main, develop, staging ]

jobs:
  stage4-memory:
    name: Stage4 (memory) contracts + e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run Stage4 (memory) contracts
        run: pnpm -s test:stage4:contracts

      - name: Install Playwright (with deps)
        run: pnpm exec playwright install --with-deps

      - name: Run Stage4 (memory) e2e
        run: pnpm -s playwright test tests/e2e/stage4.payments.cancel.spec.ts

  db-contracts:
    name: Stage4.1 DB contracts (gated by secrets)
    needs: stage4-memory
    runs-on: ubuntu-latest
    if: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
    env:
      JOBS_BACKEND: db
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run Stage4.1 DB contracts
        run: pnpm -s test:stage4.1:db | tee .logs_stage4_1_db.txt

      - name: Print DB contract logs on failure
        if: failure()
        run: |
          echo "DB contracts failed — saving logs"
          if [ -f .logs_stage4_1_db.txt ]; then cat .logs_stage4_1_db.txt; fi

  payments-db:
    name: Stage4.2 payments DB contracts (gated by secrets)
    needs: db-contracts
    runs-on: ubuntu-latest
    if: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
    env:
      JOBS_BACKEND: db
      PAYMENTS_BACKEND: db
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run Stage4.2 payments DB contracts
        run: pnpm -s test:stage4.2:contracts | tee .logs_stage4_2_payments_db.txt

      - name: Print payments DB logs on failure
        if: failure()
        run: |
          echo "Payments DB contracts failed — saving logs"
          if [ -f .logs_stage4_2_payments_db.txt ]; then cat .logs_stage4_2_payments_db.txt; fi


