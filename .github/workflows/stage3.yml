name: Stage3 Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'docs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  stage3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Stage3 contracts
        run: pnpm -s test:stage3:contracts
      - name: Stage3 e2e
        run: pnpm -s test:stage3:e2e


