name: Contracts

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/contracts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "package-lock.json"
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "tests/contracts/**"

jobs:
  contracts:
    runs-on: ubuntu-latest
    concurrency:
      group: contracts-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --ignore-scripts

      - name: Doc Check (fail fast)
        run: npm run doc-check

      - name: Run contract tests
        run: npm run test:contracts
