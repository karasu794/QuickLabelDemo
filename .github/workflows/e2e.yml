name: E2E Smoke

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "package-lock.json"
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: e2e-${{ github.ref }}
      cancel-in-progress: true
    env:
      PREVIEW_URL: ${{ vars.PREVIEW_URL || secrets.PREVIEW_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --ignore-scripts

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Show Playwright Version
        run: npx playwright --version
      # - name: Cypress install
      #   run: npx cypress install

      - name: Decide target URL (Preview or Local)
        id: decide
        run: |
          if [ -n "${PREVIEW_URL}" ]; then
            echo "mode=preview" >> $GITHUB_OUTPUT
            echo "base=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          else
            echo "mode=local" >> $GITHUB_OUTPUT
            echo "base=http://localhost:3000" >> $GITHUB_OUTPUT
          fi

      - name: Print mode
        run: |
          echo "E2E Mode: ${{ steps.decide.outputs.mode }}"
          echo "BASE_URL: ${{ steps.decide.outputs.base }}"

      - name: Run E2E against PREVIEW (Playwright)
        if: steps.decide.outputs.mode == 'preview'
        env:
          BASE_URL: ${{ steps.decide.outputs.base }}
        run: |
          echo "Running against preview: $BASE_URL"
          npx playwright test tests/e2e --config=playwright.config.ts --reporter=line
          # npx cypress run --config baseUrl=$BASE_URL --spec "tests/e2e/**/*.spec.ts"

      - name: Build & Start App (local)
        if: steps.decide.outputs.mode == 'local'
        run: |
          npm run build
          nohup npm run start > .next-serve.log 2>&1 &
          npx wait-on http://localhost:3000

      - name: Run E2E against LOCAL (Playwright)
        if: steps.decide.outputs.mode == 'local'
        env:
          BASE_URL: ${{ steps.decide.outputs.base }}
        run: |
          echo "Running against local: $BASE_URL"
          npx playwright test tests/e2e --config=playwright.config.ts --reporter=line
          # npx cypress run --config baseUrl=$BASE_URL --spec "tests/e2e/**/*.spec.ts"

      - name: Upload Playwright Report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/**
            test-results/**
            .next-serve.log
          if-no-files-found: ignore
