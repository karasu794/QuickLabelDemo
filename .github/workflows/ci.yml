name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm run typecheck
      - run: pnpm run lint:ci
      - name: Vercel build (dry-run) and collect logs
        run: |
          mkdir -p artifacts
          npx vercel build --cwd . 2>&1 | tee artifacts/build-log.txt || true
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: artifacts/build-log.txt
