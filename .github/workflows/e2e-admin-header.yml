name: e2e-admin-header

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build (if needed)
        run: pnpm build || echo "skip build"

      - name: Start app
        run: pnpm start & npx wait-on http://localhost:3000
        env:
          NODE_ENV: test
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Run E2E (admin-header)
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          BASE_URL: http://localhost:3000
        run: pnpm exec playwright test tests/e2e/admin_header.spec.ts --reporter=line

      - name: Upload artifacts (trace/screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            playwright-report
            test-results


