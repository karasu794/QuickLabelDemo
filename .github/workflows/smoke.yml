name: smoke

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master, feature/**, release/** ]

jobs:
  smoke:
    runs-on: ubuntu-latest

    env:
      BASE_URL: http://localhost:3000

      # --- Build-time minimal ENV (dummy values; no secrets) ---
      SUPABASE_URL: http://localhost:54321
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon
      FEDEX_CLIENT_ID: dummy
      FEDEX_CLIENT_SECRET: dummy
      FEDEX_API_BASE: https://apis-sandbox.fedex.com
      SHIP_API_WRITE_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (20.x)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      # ✅ devDependencies を必ず入れる
      - name: Install deps (include devDependencies)
        run: pnpm install --frozen-lockfile --prod=false

      # 2) 念のため corepack でも有効化（環境差で action が効かないケースの保険）
      - name: Enable pnpm via corepack (fallback)
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm -v
          which pnpm || command -v pnpm || true

      - name: Print tool versions
        run: |
          node -v
          pnpm -v
          which pnpm || command -v pnpm

      - name: Build
        run: pnpm -s build

      - name: Start & Smoke
        run: |
          pnpm dlx start-server-and-test \
            "pnpm -s start" \
            $BASE_URL/api/health \
            "pnpm -s exec tsx scripts/probe/smoke.ts"


