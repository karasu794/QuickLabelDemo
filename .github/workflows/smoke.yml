name: smoke

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master, feature/**, release/** ]

jobs:
  smoke:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production
      BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (20.x)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: true

      # 2) 念のため corepack でも有効化（環境差で action が効かないケースの保険）
      - name: Enable pnpm via corepack (fallback)
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm -v
          which pnpm || command -v pnpm || true

      - name: Print tool versions
        run: |
          node -v
          pnpm -v
          which pnpm || command -v pnpm

      - name: Build
        run: pnpm -s build

      - name: Start & Smoke
        run: |
          pnpm dlx start-server-and-test \
            "pnpm -s start" \
            $BASE_URL/api/health \
            "pnpm -s exec tsx scripts/probe/smoke.ts"


